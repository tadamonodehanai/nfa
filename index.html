<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長野県サッカー協会｜情報探索 プロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* --- 面・文字（押せない＝情報） --- */
    --bg:#F5F6F9; --card:#FFFFFF; --soft:#EEF0F4;
    --ink:#1B1D26; --ink2:#5B6270; --muted:#9AA0AC;
    --line:#DDE1E9;                 /* 罫線（状態表示など、押せないもの） */

    /* --- ブランド（ネイビー） --- */
    --accent:#1D2283; --accentDk:#151845; --accentPale:#E9EAF3;

    /* --- 押せる：優先度 高（主要CTA／画面に1つ）＝グリーン --- */
    --cta:#00915C; --ctaHover:#00A86C; --ctaPale:#E3F8EE;
    --ctaText:#00784B;   /* 白地の上で文字として使う濃いグリーン */

    /* --- 押せる：優先度 中（ナビ・戻る・条件操作）＝ネイビーの枠/淡面 --- */
    --act2:#1D2283; --act2Pale:#E9EAF3;

    /* --- 押せる：優先度 低（タグ・候補）＝淡いネイビー面 --- */
    --act3:#3A3F9E; --act3Bg:#F0F1F8;

    --appbar:68px; --dock:104px;
    --font:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font);font-weight:400;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  ::selection{background:var(--accent);color:#fff;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:4px;}
  .tl{display:inline-flex;align-items:center;gap:6px;transform:translateY(-1px);}

  /* ---------- header ---------- */
  .appbar{height:var(--appbar);display:flex;align-items:center;justify-content:space-between;
    padding:0 28px;background:var(--card);border-bottom:1px solid var(--soft);position:relative;z-index:40;}
  .abl{display:flex;align-items:center;gap:18px;}
  .brand{display:flex;align-items:center;gap:18px;cursor:pointer;}
  .logo-fa{height:26px;width:auto;display:block;}
  .logo-lp{height:30px;width:auto;display:block;border-radius:3px;}
  .abr{display:flex;align-items:center;gap:14px;}
  .demo-tag{font-size:12px;font-weight:400;color:var(--ink2);background:transparent;border:1px solid var(--line);padding:5px 11px;border-radius:3px;letter-spacing:.04em;}
  .iconbtn{width:38px;height:38px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--ink);transition:background .15s;}
  .iconbtn:hover{background:var(--soft);}
  .burger{flex-direction:column;gap:5px;}
  .burger span{display:block;width:18px;height:1.5px;background:var(--ink);transition:transform .2s,opacity .2s;}
  .burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
  .burger.open span:nth-child(2){opacity:0;}
  .burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}

  /* menu drawer */
  .scrim{position:fixed;inset:0;background:rgba(16,18,40,.28);opacity:0;pointer-events:none;transition:opacity .22s;z-index:45;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:340px;max-width:86vw;background:var(--card);
    transform:translateX(102%);transition:transform .28s cubic-bezier(.2,.7,.2,1);z-index:50;
    padding:28px 28px;display:flex;flex-direction:column;border-left:1px solid var(--soft);}
  .drawer.open{transform:translateX(0);}
  .drawer .dclose{align-self:flex-end;font-size:22px;color:var(--ink2);width:36px;height:36px;border-radius:4px;}
  .drawer .dlab{font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;margin:12px 0 18px;display:flex;align-items:center;gap:9px;}
  .drawer .dlab .bar{width:22px;height:3px;background:var(--accent);border-radius:2px;}
  .mitem{display:block;text-align:left;padding:18px 0;font-size:16px;font-weight:400;color:var(--ink);border-bottom:1px solid var(--soft);transition:color .15s,padding-left .15s;}
  .mitem:hover{color:var(--accent);padding-left:6px;}
  .mitem .men{display:block;font-size:12px;color:var(--muted);margin-top:5px;letter-spacing:.06em;}
  .dfoot{margin-top:auto;font-size:12px;color:var(--muted);line-height:1.9;}

  /* ---------- ENTRY mode ---------- */
  .entry{min-height:calc(100vh - var(--appbar));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 80px;}
  .entry .lead{font-size:32px;font-weight:700;line-height:1.5;text-align:center;margin:0 0 12px;letter-spacing:.01em;}
  .entry .sub{font-size:13px;color:var(--ink2);text-align:center;margin:0 0 48px;line-height:1.9;}
  .entry .searchwrap{width:100%;max-width:680px;}
  .exlab{font-size:12px;color:var(--muted);text-align:center;margin:26px 0 12px;}
  .entry .exrow{justify-content:center;margin-top:0;}

  .slab{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;margin:0 0 12px;}
  .slab .bar{width:22px;height:3px;border-radius:2px;background:var(--accent);}
  .inputbox{position:relative;}
  .inputbox svg{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--accent);}
  .qin{width:100%;height:66px;border:2.5px solid var(--accent);background:var(--card);border-radius:6px;
    padding:0 56px 0 58px;font-size:18px;font-weight:400;color:var(--ink);font-family:inherit;transition:border-color .15s,box-shadow .15s;}
  .qin::placeholder{color:var(--muted);}
  .qin:focus{outline:none;border-color:var(--accentDk);box-shadow:0 0 0 4px var(--accentPale);}
  .clearq{position:absolute;right:18px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:4px;
    background:var(--soft);color:var(--ink2);font-size:17px;display:none;align-items:center;justify-content:center;}
  .clearq.show{display:flex;}
  .exrow{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px;}
  .ex{font-size:13px;color:var(--ink);background:var(--card);border-radius:2px;padding:0 12px;height:31px;
    display:inline-flex;align-items:center;}
  .ex:hover{background:var(--act3Bg);color:var(--act3);}
  .ex .hash{color:var(--accent);font-weight:700;margin-right:1px;}

  /* ---------- CHAT mode ---------- */
  .chatwrap{display:flex;height:calc(100vh - var(--appbar));overflow:hidden;}
  .sidebar{width:280px;flex:none;background:var(--card);border-right:1px solid var(--soft);overflow-y:auto;
    padding:24px 20px 40px;transition:margin-left .26s cubic-bezier(.2,.7,.2,1);}
  .sidebar.hide{margin-left:-280px;}
  .sbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .sbtop .t{font-size:12px;font-weight:500;color:var(--ink2);letter-spacing:.06em;}
  .sbtop .c{font-size:12px;color:var(--muted);width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;}
  .sbtop .c:hover{background:var(--soft);}
  .main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;}
  .thread{flex:1;overflow-y:auto;padding:34px 40px 24px;}
  .threadin{max-width:800px;margin:0 auto;}
  .sbtoggle{align-self:flex-start;margin:12px 0 0 20px;font-size:12px;color:var(--act2);background:var(--act2Pale);
    border:1px solid var(--act2);border-radius:3px;padding:8px 12px;display:none;flex:none;}
  .sbtoggle.show{display:inline-block;}

  /* ---------- conversation（吹き出しで会話が進む） ---------- */
  .turn{margin:0 0 30px;animation:pop .34s cubic-bezier(.2,.7,.2,1) both;}
  .turn:first-child{padding-top:4px;}
  .you{display:flex;justify-content:flex-end;margin:0 0 20px;}
  .you .bub{position:relative;background:var(--card);color:var(--ink);font-size:15px;line-height:1.8;
    border-radius:14px 14px 2px 14px;padding:14px 19px;max-width:76%;font-weight:500;}
  .you .bub::after{content:"";position:absolute;right:-6px;bottom:0;width:12px;height:12px;background:var(--card);
    transform:rotate(45deg);}
  .nfa{display:flex;gap:12px;align-items:flex-start;}
  .nfa .av{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;
    display:flex;align-items:center;justify-content:center;flex:none;margin-top:2px;}
  .nfa .side{flex:1;min-width:0;max-width:82%;}
  /* 吹き出し（しっぽ付き・フラット） */
  .bubble{position:relative;background:var(--card);border-radius:2px 14px 14px 14px;padding:18px 22px;
    font-size:15px;line-height:2;color:var(--ink2);}
  .bubble::before{content:"";position:absolute;left:-6px;top:0;width:12px;height:12px;background:var(--card);
    transform:rotate(45deg);}
  .bubble b{color:var(--ink);font-weight:500;}
  .bubble + .bubble{margin-top:10px;}
  /* 吹き出し内の「関連のご案内」区画（主たる情報と明確に区別しつつ、同じ吹き出しに同居させる） */
  .bsec{margin-top:16px;background:var(--bg);border-radius:6px;padding:14px 16px 12px;}
  .bsec .bh{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:500;color:var(--accent);letter-spacing:.1em;margin:0 0 2px;}
  .bsec .bh .barmini{width:14px;height:3px;border-radius:2px;background:var(--accent);}
  .bsec .brow{margin-top:9px;}
  .bsec .bk{display:block;font-size:12px;color:var(--ink2);margin:0 0 3px;}
  .bsec .itag{background:var(--card);}
  .bsec .itag:hover{background:var(--act2);color:#fff;}
  /* 文中に埋め込むタグ */
  .itag{display:inline-flex;align-items:center;height:28px;padding:0 11px;margin:2px 3px;border-radius:2px;
    background:var(--act3Bg);color:var(--act3);font-size:14px;line-height:1;vertical-align:middle;
    transition:background .15s,color .15s,transform .1s;}
  .itag:hover{background:var(--act2);color:#fff;}
  .itag:active{transform:scale(.96);}
  .itag .hash{font-weight:700;margin-right:1px;}
  .itag .tn{margin-left:3px;font-size:11px;opacity:.65;}
  .fan.converge .itag{animation:converge .3s ease forwards;}
  .inlinetags{margin-top:4px;}
  /* 副動線：いまの条件（サイドバー内） */
  .condbox{background:var(--accentPale);border-radius:4px;padding:14px 14px 12px;margin:0 0 22px;}
  .ckey{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--accent);margin:0 0 10px;}
  .chits{color:var(--ink2);}
  .conds{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 10px;}
  .cond{display:inline-flex;align-items:center;height:27px;padding:0 5px 0 10px;border-radius:2px;
    background:var(--accent);color:#fff;font-size:12px;line-height:1;gap:3px;}
  .cond .hash{font-weight:700;}
  .cx{color:#fff;opacity:.7;font-size:12px;padding:0 3px;line-height:1;}
  .cx:hover{opacity:1;}
  .creset{font-size:12px;color:var(--ink2);background:transparent;border:1px solid var(--line);border-radius:2px;padding:7px 10px;line-height:1;width:100%;transition:border-color .15s,color .15s;}
  .creset:hover{border-color:var(--act2);color:var(--act2);}
  /* 続きがあるよ、の誘導（円形の↓アイコン） */
  .dock{position:relative;}
  .scrolldown{position:absolute;left:50%;bottom:calc(100% + 10px);transform:translateX(-50%);
    display:none;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;
    color:#fff;background:var(--act2);font-size:16px;line-height:1;z-index:6;
    transition:background .15s;animation:bob 1.6s ease-in-out infinite;}
  .scrolldown:hover{background:var(--accentDk);}
  .scrolldown.show{display:inline-flex;}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(3px);}}

  /* radial / fan tag cloud */
  .radial{position:relative;margin:6px 0 20px;}
  .rcap{font-size:12px;color:var(--muted);letter-spacing:.06em;margin:0 0 14px;}
  .fan{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .fan .tag{animation:fanIn .42s cubic-bezier(.2,.7,.2,1) both;}
  .fan .tag:nth-child(1){animation-delay:.02s;} .fan .tag:nth-child(2){animation-delay:.06s;}
  .fan .tag:nth-child(3){animation-delay:.10s;} .fan .tag:nth-child(4){animation-delay:.14s;}
  .fan .tag:nth-child(5){animation-delay:.18s;} .fan .tag:nth-child(6){animation-delay:.22s;}
  .fan .tag:nth-child(7){animation-delay:.26s;} .fan .tag:nth-child(8){animation-delay:.30s;}
  .fan .tag:nth-child(9){animation-delay:.34s;} .fan .tag:nth-child(n+10){animation-delay:.38s;}
  .fan.converge .tag{animation:converge .3s ease forwards;}
  @keyframes fanIn{
    from{opacity:0;transform:translateY(16px) scale(.9);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  @keyframes converge{
    to{opacity:0;transform:translateY(-10px) scale(.86);}
  }
  .fan .tag.big{height:39px;font-size:15px;padding:0 16px;}

  /* tags (solid, borderless) */
  .tag{display:inline-flex;align-items:center;height:33px;padding:0 13px;border-radius:2px;
    background:var(--card);color:var(--ink);font-size:14px;font-weight:400;line-height:1;
    transition:background .15s,color .15s,transform .1s;}
  .tag:hover{background:var(--act3Bg);color:var(--act3);}
  .tag:active{transform:scale(.97);}
  .tag .hash{color:var(--accent);font-weight:700;}
  .tag .pdot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none;}
  .tag.hit{background:var(--accent);color:#fff;}
  .tag.hit .hash,.tag.hit .pdot{color:#fff;background:transparent;}
  .tag.hit .pdot{background:#fff;}
  .tag .x{margin-left:2px;opacity:.85;}
  .tag .tn{margin-left:4px;font-size:11px;color:var(--muted);line-height:1;}
  .tag.hit .tn{color:#fff;background:rgba(255,255,255,.22);}
  .tgroup{margin-bottom:26px;}
  .gl{font-size:12px;font-weight:500;color:var(--ink2);letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:9px;}
  .gl .barmini{width:16px;height:3px;border-radius:2px;background:var(--accent);}
  .gtags{display:flex;flex-wrap:wrap;gap:8px;}
  .clearall{font-size:12px;color:var(--ink2);background:transparent;border:1px solid var(--line);border-radius:3px;padding:6px 10px;line-height:1;}
  .clearall:hover{border-color:var(--act2);color:var(--act2);}

  /* answer / cards */
  .answer{background:var(--card);border-radius:8px;padding:28px 30px;margin:4px 0 16px;}
  .answer .top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
  .answer h2{font-size:24px;font-weight:700;margin:0;line-height:1.45;}
  .badge{display:inline-flex;align-items:center;gap:7px;background:transparent;color:var(--ink2);border:1px solid var(--line);font-size:12px;font-weight:400;padding:6px 12px;border-radius:3px;white-space:nowrap;flex:none;}
  .badge .bd{width:6px;height:6px;border-radius:50%;background:var(--cta);}
  .answer .src{color:var(--ink2);font-size:12px;margin:14px 0 0;}
  .answer .sum{color:var(--ink2);font-size:14px;line-height:2;margin:16px 0 0;}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--cta);color:#fff;font-weight:700;font-size:14px;padding:14px 26px;border-radius:4px;margin-top:22px;transition:background .15s,transform .1s;}
  .btn:hover{background:var(--ctaHover);}
  .btn:active{transform:translateY(1px);}
  .rlabel{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.06em;margin:6px 0 12px;}
  .card{background:var(--card);border-radius:6px;padding:22px 24px;margin:0 0 12px;cursor:pointer;transition:background .15s,transform .1s;}
  .card:hover{background:var(--soft);}
  .card h3{font-size:16px;font-weight:500;margin:0;}
  .card .meta{color:var(--muted);font-size:12px;margin:9px 0 0;}
  .card .snip{color:var(--ink2);font-size:14px;line-height:1.85;margin:9px 0 0;}
  .card .openbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--act2);
    background:var(--act2Pale);border:1px solid var(--act2);border-radius:4px;padding:9px 14px;margin:14px 0 0;
    transition:background .15s,color .15s;}
  .card:hover .openbtn,.card .openbtn:hover{background:var(--act2);color:#fff;}
  .empty{color:var(--ink2);font-size:14px;padding:20px 0;}

  /* dock (GPT-like bottom input) */
  .dock{flex:none;background:var(--bg);padding:16px 40px 22px;border-top:1px solid var(--soft);}
  .dockin{max-width:800px;margin:0 auto;position:relative;}
  .dockin .qin{height:58px;font-size:16px;padding:0 60px 0 22px;}
  .send{position:absolute;right:9px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:4px;
    background:var(--cta);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .send:hover{background:var(--ctaHover);}
  .dhint{font-size:12px;color:var(--muted);text-align:center;margin:11px 0 0;}

  /* ---------- static page ---------- */
  .page{max-width:760px;margin:0 auto;padding:64px 32px 110px;}
  .page .en{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.1em;}
  .page h1{font-size:32px;font-weight:700;line-height:1.5;margin:10px 0 28px;}
  .page .plead{font-size:16px;line-height:2.1;color:var(--ink2);margin:0 0 56px;}
  .pblock{margin:0 0 48px;}
  .pblock h2{font-size:24px;font-weight:700;line-height:1.5;margin:0 0 16px;}
  .pblock p{font-size:15px;line-height:2.1;color:var(--ink2);margin:0;}
  .pback{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--act2);background:var(--act2Pale);
    border:1px solid var(--act2);border-radius:4px;padding:10px 16px;margin-top:16px;transition:background .15s,color .15s;}
  .pback:hover{background:var(--act2);color:#fff;}

  /* ---------- source page ---------- */
  .srcbody{max-width:820px;margin:0 auto;padding:48px 32px 110px;}
  .back{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--act2);background:var(--act2Pale);
    border:1px solid var(--act2);border-radius:4px;padding:10px 16px;margin-bottom:32px;transition:background .15s,color .15s;}
  .back:hover{background:var(--act2);color:#fff;}
  .crumb{color:var(--muted);font-size:12px;margin:0 0 20px;}
  .tchips{display:flex;flex-wrap:wrap;gap:9px;margin:0 0 28px;}
  .tchip{font-size:13px;color:var(--ink);background:var(--card);border-radius:2px;padding:0 13px;height:31px;
    display:inline-flex;align-items:center;}
  .srcbody h1{font-size:32px;font-weight:700;line-height:1.45;margin:0 0 28px;}
  .srcmeta{display:flex;align-items:center;gap:13px;margin:0 0 40px;}
  .srcmeta .av{width:36px;height:36px;border-radius:4px;background:var(--accent);color:#fff;font-weight:500;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .srcmeta .cm{font-weight:500;font-size:14px;}
  .srcmeta .dt{color:var(--muted);font-size:12px;}
  .lead{color:var(--ink2);font-size:16px;line-height:2.1;margin:0 0 48px;}
  .sect{margin:0 0 20px;}
  .sect .bar{width:30px;height:4px;border-radius:2px;background:var(--accent);margin:0 0 14px;}
  .sect .en{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em;}
  .sect .jp{font-size:24px;font-weight:700;margin:4px 0 0;}
  table.res{width:100%;border-collapse:collapse;margin:0 0 20px;}
  table.res th{text-align:left;padding:0 18px 14px;font-size:12px;font-weight:500;color:var(--muted);}
  table.res td{text-align:left;padding:16px 18px;font-size:16px;}
  table.res tr:nth-child(even) td{background:var(--soft);}
  table.res .venue{color:var(--ink2);font-size:14px;width:120px;}
  table.res .score{font-weight:700;width:110px;color:var(--accent);}
  .srclinks{display:flex;flex-wrap:wrap;gap:28px;margin:0 0 48px;font-weight:500;font-size:14px;color:var(--act2);}
  .srclinks .srclink{font-weight:500;font-size:14px;color:var(--act2);border-bottom:1px solid var(--act2);padding:0 0 2px;}
  .srclinks .srclink:hover{color:var(--ctaText);border-bottom-color:var(--ctaText);}

const {PAGES,CONTENT,AGES,INTENTS,RESOURCES,ADMINX,DEEP,BROAD,EXAMPLES}=window.NFA;  // データは data.js

/* ===== 探索エンジン（本番は analyze()/buildCloud() を RAG+LLM に差し替え） ===== */
function detect(q){
  q=q||'';
  let age=null;
  for(const a of AGES){ if(q.includes(a.q)||q.includes(a.f)){ age=a; break; } }
  let intent=null;
  const im={
    '試合結果':()=>q.includes('試合結果')||q.includes('試合')||q.includes('結果'),
    '大会日程':()=>q.includes('大会日程')||q.includes('日程')||q.includes('スケジュール'),
    '順位表':()=>q.includes('順位'),
    '組み合わせ':()=>q.includes('組み合わせ')||q.includes('組合せ'),
    'チーム':()=>q.includes('チーム')||q.includes('入会')||q.includes('加盟')||q.includes('さがす'),
    '体験':()=>q.includes('体験')||q.includes('募集')||q.includes('はじめ'),
  };
  for(const it of INTENTS){ if(im[it.core] && im[it.core]()){ intent={kind:'intent',obj:it}; break; } }
  if(!intent){ for(const r of RESOURCES){ if(q.includes(r.core)||(r.core==='審判'&&q.includes('審判'))||(r.core==='指導者'&&q.includes('指導者'))||(r.core==='講習会'&&q.includes('講習'))){ intent={kind:'res',obj:r}; break; } } }
  if(!intent){ for(const ad of ADMINX){ if(q.includes(ad.core)||(ad.core==='規約'&&(q.includes('様式')||q.includes('書類')||q.includes('登録')))||(ad.core==='中止'&&q.includes('順延'))){ intent={kind:'admin',obj:ad}; break; } } }
  return {age,intent};
}
function tagObj(label,q,priority){ return {label,q,priority:!!priority}; }
function buildCloud(q){
  q=(q||'').trim();
  const {age,intent}=detect(q);
  if(!age && !intent){
    return { mode:'root', groups:[
      {label:'だれの情報？（年代・カテゴリ）', tags:AGES.map(a=>tagObj(a.l,a.q))},
      {label:'試合・大会のこと', tags:INTENTS.slice(0,4).map(i=>tagObj(i.l,i.q))},
      {label:'はじめたい・入りたい', tags:INTENTS.slice(4).map(i=>tagObj(i.l,i.q))},
      {label:'資格・講習', tags:RESOURCES.map(r=>tagObj(r.l,r.q))},
      {label:'手続き・安全・お知らせ', tags:ADMINX.map(a=>tagObj(a.l,a.q,a.pri===1))},
    ]};
  }
  const selected=[];
  if(age) selected.push(tagObj(age.l,age.q));
  if(intent) selected.push(tagObj(intent.obj.short||intent.obj.l, intent.obj.q, intent.obj.pri===1));
  let narrow=[], branch=[];
  if(age && !intent){
    narrow = INTENTS.map(i=>tagObj(age.q+'の'+i.short, age.q+' '+i.q));
    branch = AGES.filter(a=>a!==age).map(a=>tagObj(a.l,a.q));
  } else if(intent && !age && intent.kind==='intent'){
    narrow = AGES.map(a=>tagObj(a.q+'の'+intent.obj.short, a.q+' '+intent.obj.q));
    branch = INTENTS.filter(i=>i!==intent.obj).map(i=>tagObj(i.l,i.q));
  } else if(age && intent && intent.kind==='intent'){
    const deep = DEEP[intent.obj.core] || [];
    narrow = deep.map(d=>tagObj(age.q+'の'+d[0], age.q+' '+intent.obj.q+' '+d[1]));
    branch = INTENTS.filter(i=>i!==intent.obj).slice(0,4).map(i=>tagObj(age.q+'の'+i.short, age.q+' '+i.q))
      .concat(AGES.filter(a=>a!==age).slice(0,3).map(a=>tagObj(a.q+'の'+intent.obj.short, a.q+' '+intent.obj.q)));
  } else if(intent && intent.kind==='res'){
    const map={ '審判':['審判をはじめる','審判の講習日程','担当の割り当て'],
      '指導者':['C級をとる','リフレッシュ研修','コーチを募集'],
      '講習会':['審判の講習','指導者の講習','GKクリニック'],
      'GK':['GKクリニック','GK体験会'] };
    narrow=(map[intent.obj.core]||[]).map(l=>tagObj(l,l));
    branch=RESOURCES.filter(r=>r!==intent.obj).map(r=>tagObj(r.l,r.q));
  } else if(intent && intent.kind==='admin'){
    narrow=ADMINX.filter(a=>a!==intent.obj).map(a=>tagObj(a.l,a.q,a.pri===1));
    branch=AGES.slice(0,4).map(a=>tagObj(a.l,a.q));
  } else {
    branch=AGES.map(a=>tagObj(a.l,a.q));
  }
  return { mode:'focus', selected, narrow, branch };
}
/* 1つの条件語が、その情報に当てはまるか（AND判定の単位） */
function matches(it, w){
  if(!w) return true;
  if(it.title.includes(w)) return true;
  if(it.keywords.some(k=>k.includes(w)||w.includes(k))) return true;
  if(Object.values(it.axes).flat().some(v=>v.includes(w)||w.includes(v))) return true;
  if((it.committee||'').includes(w)) return true;
  return false;
}
function analyze(qRaw){
  const q=(qRaw||'').trim();
  if(!q) return {q,results:[],answer:null,ambiguous:false};
  const words=q.split(/\s+/).filter(Boolean);
  const hasAge=!!detect(q).age;
  /* 条件はAND：すべての条件を満たすものだけを残す（足すほど必ず絞られる） */
  const hits=CONTENT.filter(it=>words.every(w=>matches(it,w)));
  const scored=hits.map(it=>{
    let s=0;
    it.keywords.forEach(k=>{ if(q.includes(k)) s+=2; });
    if(q.includes(it.title)) s+=4;
    Object.values(it.axes).flat().forEach(v=>{ if(q.includes(v)) s+=1; });
    if(it.priority) s+=0.5;
    return {it,s};
  }).sort((a,b)=>b.s-a.s);
  const ambiguous = BROAD.some(b=>q.includes(b)) && !hasAge && scored.length>2;
  let answer=null;
  const top=scored[0];
  if(top && !ambiguous && top.s>=4 && (scored.length<2 || top.s-scored[1].s>=1.5 || top.s>=6)){
    answer={item:top.it, confidence: top.s>=6?'高':'中'};
  }
  return {q, results:scored.map(x=>x.it), answer, ambiguous};
}

function scrollToLatest(){

  const turns=th.querySelectorAll('.turn');
  const last=turns[turns.length-1];
  if(!last){ th.scrollTop=0; return; }

/* 0件のとき：ユーザーの言葉を解釈して、次の道を示す（本文と関連区画に分けて、1つの吹き出しに収める）
   （本番では、この関数を Claude API 呼び出しに置き換える差し替え点） */
function rescueParts(t){
  const conds = t.conds || [];
  const inline = (arr, showCount) => arr.map(x=>
    `<button class="itag" data-swap="${esc(x.q)}"><span class="hash">#</span>${esc(x.label)}${showCount?`<span class="tn">（${x.n}件）</span>`:''}</button>`).join('');

  /* 0) 言葉そのものが汲み取れなかったとき */
  if(t.unread){
    const starts = AGES.slice(0,4).map(a=>({label:a.l,q:a.q,n:analyze(a.q).results.length})).filter(x=>x.n>0);
    return { main:`すみません、「${esc(t.raw||'')}」がうまく汲み取れませんでした。<b>だれの</b>ことか、<b>何を</b>知りたいかを教えていただけると探せます。たとえば「小学生の試合結果」「審判になりたい」のように。`,
      secs:[{k:'まずはここから', html:inline(starts,true)}] };
  }

  /* 1) 条件が2つ以上：どれか1つを外せば見つかる、を具体的に示す */
  if(conds.length>=2){
    const relax = conds.map(c=>{
      const rest = conds.filter(x=>x!==c);
      const n = analyze(rest.join(' ')).results.length;
      return { label:`「${c}」をはずす`, q:rest.join(' '), n, dropped:c };
    }).filter(x=>x.n>0).sort((a,b)=>b.n-a.n).slice(0,3);
    if(relax.length){
      const combo = conds.map(c=>`「${c}」`).join('と');
      return { main:`${esc(combo)}を両方みたす情報は、いまのところ無いようです。どちらか片方だけなら見つかります。`,
        secs:[{k:'条件をゆるめる', html:inline(relax,false)}] };
    }
  }

  /* 2) 言葉は分かるが該当が無い：意図を汲んで、近いものを案内 */
  const q = (t.raw || t.pick || t.q || '');
  const guess = interpret(q);
  if(guess.suggests.length){
    return { main:esc(guess.read), secs:[{k:'こちらならご案内できます', html:inline(guess.suggests,true)}] };
  }

  /* 3) まったく手がかりが無い：探し方そのものを案内 */
  const starts = AGES.slice(0,4).map(a=>({label:a.l,q:a.q,n:analyze(a.q).results.length})).filter(x=>x.n>0);
  return { main:`うまく聞き取れませんでした。すみません。「小学生の試合結果」「審判になりたい」のように、<b>だれの</b>・<b>何を</b>知りたいか教えていただけると探せます。`,
    secs:[{k:'まずはここから', html:inline(starts,true)}] };
}

/* 自然文をゆるく解釈して、近い情報を提案する（AIレイヤーの代役） */
function interpret(q){
  q = q || '';
  const suggests = [];
  const push = (label, query) => {
    const n = analyze(query).results.length;
    if(n>0 && !suggests.some(s=>s.q===query)) suggests.push({label, q:query, n});
  };
  let read = 'その言葉に近い情報は見つかりませんでした。';

  /* 年代らしき語 */
  const age = AGES.find(a=>q.includes(a.q)||q.includes(a.f));
  /* 意図らしき語（協会の言葉に翻訳する） */
  const wants = [
    { re:/勝|負|スコア|点|結果/, read:'試合の結果', q:'試合結果' },
    { re:/いつ|次|予定|日程|スケジュール|何時/, read:'試合や大会の日程', q:'大会日程' },
    { re:/順位|何位|ランキング|表/, read:'順位表', q:'順位表' },
    { re:/入り|入会|加入|チーム|クラブ|さが|近く|どこ/, read:'チームさがし・入会', q:'チーム さがす' },
    { re:/始|はじ|やりたい|体験|習|初心/, read:'はじめかた・体験会', q:'体験 募集' },
    { re:/審判|レフェリー|笛/, read:'審判のこと', q:'審判 資格' },
    { re:/監督|コーチ|指導/, read:'指導者のこと', q:'指導者 ライセンス' },
    { re:/暑|熱中症|水分|倒れ/, read:'熱中症の対策', q:'熱中症' },
    { re:/雨|中止|延期|順延|台風/, read:'試合の中止・順延', q:'中止 順延' },
    { re:/書類|様式|用紙|申請|登録|規約/, read:'登録・様式', q:'規約 様式' },
  ];
  const want = wants.find(w=>w.re.test(q));

  if(age && want){
    read = `${age.l}の${want.read}をお探しでしょうか。ただ、その組み合わせでは見つかりませんでした。`;
    push(`${age.q}の${want.read}`, `${age.q} ${want.q}`);
    push(want.read, want.q);
    push(`${age.l}の情報`, age.q);
  } else if(want){
    read = `${want.read}についてでしょうか。`;
    push(want.read, want.q);
    AGES.slice(0,4).forEach(a=>push(`${a.q}の${want.read}`, `${a.q} ${want.q}`));
  } else if(age){
    read = `${age.l}についてでしょうか。`;
    push(`${age.l}の情報`, age.q);
    INTENTS.slice(0,3).forEach(i=>push(`${age.q}の${i.short}`, `${age.q} ${i.q}`));
  }
  return { read, suggests: suggests.slice(0,4) };
}

/* タグ選択や操作を、人が話しているような一言に言い換える */
function utterance(t){
  const p = t.pick || t.q || '';
  if(t.via==='drop')  return `「${p}」の条件ははずしたいです`;
  if(t.via!=='tag')   return p;                       // 自分で打った言葉は、そのまま
  const mDrop = /^「(.+)」をはずす$/.exec(p);
  if(mDrop)           return `「${mDrop[1]}」の条件ははずしたいです`;
  /* タグの内容に合わせて、言い回しを選ぶ */
  if(/結果/.test(p))            return `${p}が知りたいです`;
  if(/日程|いつ|予定|組み合わせ/.test(p)) return `${p}を教えてください`;
  if(/順位/.test(p))            return `${p}を見たいです`;
  if(/資格|ライセンス|講習|クリニック/.test(p)) return `${p}について知りたいです`;
  if(/募集|体験|入会|さがし|チーム/.test(p))    return `${p}について教えてください`;
  if(/熱中症|中止|順延/.test(p)) return `${p}のことが気になります`;
  if(/様式|規約|書類|登録/.test(p)) return `${p}はどこにありますか？`;
  if(/^(小学生|中学生|高校生|大人|社会人|シニア|女子|フットサル|園児|キッズ)/.test(p))
    return `${p}の情報が見たいです`;
  return `${p}について知りたいです`;
}

function turnHtml(t,i){
  const a=t.res;
  const isLast = i===state.turns.length-1;
  const now = a.results.length;

  /* ユーザー側の発話（タグ選択でも“会話”になるように言い換える） */
  const said = utterance(t);
  const you = `<div class="you"><div class="bub">${esc(said)}</div></div>`;

  /* 次の一手のタグ（0件・絞れないものは出さない） */
  let tags=[];
  if(isLast){
    const c=buildCloud(t.q);
    const cand = c.mode==='focus' ? c.narrow.concat(c.branch) : (c.groups[0].tags||[]);
    const seen={};
    const curAge = detect(t.q).age;
    tags = cand.filter(x=>{
      /* すでに年代が決まっているのに、別の年代を足す候補は矛盾するので出さない */
      if(curAge){
        const other = AGES.find(a=>a!==curAge && (String(x.q).includes(a.q)||String(x.label).includes(a.q)));
        if(other) return false;
      }
      return true;
    }).map(x=>{
      const merged = dedupeConds((t.conds||[]).concat(String(x.q).split(/\s+/)));
      return Object.assign({},x,{n:analyze(merged.join(' ')).results.length});
    }).filter(x=>{
      if(x.n<1) return false;
      if(x.n===now && (t.conds||[]).length) return false;
      if(seen[x.label]) return false; seen[x.label]=1;
      return true;
    }).slice(0,6);
  }
  const tagsInline = tags.map(x=>
    `<button class="itag" data-q="${esc(x.q)}"><span class="hash">#</span>${esc(x.label)}<span class="tn">（${x.n}件）</span></button>`).join('');

  /* 協会の返事：1ターン＝1つの吹き出し。
     関連のご案内は、同じ吹き出しの中の区画（.bsec）として主情報と明確に区別して同居させる */
  let main=''; let secs=[]; let answerCard='';
  if(a.answer){
    const it=a.answer.item;
    main = `<b>${esc(it.title)}</b> が近そうです。${esc(it.committee)}が ${esc(it.date)} に更新しています。`;
    answerCard = `<div class="answer">
      <div class="top"><h2>${esc(it.title)}</h2><span class="badge"><span class="tl"><span class="bd"></span>確信度 ${a.answer.confidence}</span></span></div>
      <div class="src">出典：${esc(it.committee)} ・ ${esc(it.date)} 更新</div>
      <div class="sum">${esc(it.lead||it.snippet)}</div>
      <button class="btn" data-open="${it.id}">この結果ページを開く</button></div>`;
  } else if(a.ambiguous){
    main = `候補がいくつかあります。<b>どなたの情報でしょう？</b>`;
    if(tagsInline) secs.push({k:'選ぶと絞り込めます', html:tagsInline});
  } else if(now){
    main = `この条件だと、${now}件ありました。下にまとめています。`;
  } else {
    const r = rescueParts(t);
    main = r.main; secs = r.secs;
  }

  /* 関連のご案内（さらに絞る・年代の入れ替え）を、同じ吹き出しの区画として追加 */
  if(isLast && !a.ambiguous && !t.unread && now){
    if(tagsInline){
      secs.push({k: a.answer ? 'ほかにも、こんな情報' : 'さらに絞る', html:tagsInline});
    }
    /* 年代が決まっているなら、「別の年代で見る」は“入れ替え”として案内（AND条件と矛盾させない） */
    const curAge2 = detect(t.q).age;
    if(curAge2){
      const swaps = AGES.filter(a2=>a2!==curAge2).map(a2=>{
        const q = (t.conds||[]).map(c=>c===curAge2.q?a2.q:c).join(' ');
        const n = analyze(q).results.length;
        return {a:a2,q,n};
      }).filter(x=>x.n>0).slice(0,5);
      if(swaps.length){
        const sw = swaps.map(x=>`<button class="itag" data-swap="${esc(x.q)}"><span class="hash">#</span>${esc(x.a.l)}<span class="tn">（${x.n}件）</span></button>`).join('');
        secs.push({k:'同じ条件で、ほかの年代を見る', html:sw});
      }
    }
  }
  const secLab = (a.answer || (now && !a.ambiguous)) ? '関連のご案内' : '次の一歩';
  const secHtml = secs.length ? `<div class="bsec"><div class="bh"><span class="barmini"></span>${secLab}</div>${
    secs.map(s=>`<div class="brow"><span class="bk">${s.k}</span><span class="inlinetags">${s.html}</span></div>`).join('')}</div>` : '';
  const bubble = `<div class="bubble">${main}${secHtml}</div>`;

  /* 一覧（会話の下に自然に続く） */
  const list=a.answer?a.results.filter(r=>r.id!==a.answer.item.id):a.results;
  let cards='';
  if(list.length){
    cards += list.slice(0, isLast?8:3).map(it=>`<div class="card" data-open="${it.id}">
      <h3>${esc(it.title)}</h3>
      <div class="meta">出典：${esc(it.committee)} ・ ${esc(it.date)} 更新</div>
      <div class="snip">${esc(it.snippet)}</div>
      <button class="openbtn" data-open="${it.id}">出典ページを開く →</button></div>`).join('');
  }

  return `<div class="turn">
    ${you}
    <div class="nfa"><div class="av">N</div><div class="side">
      ${bubble}
      ${answerCard}
      ${cards}
    </div></div>
  </div>`;
}

/* ---------- ask（条件を累積して絞り込む） ---------- */
function ask(input, via, pick){
  const add=(input||'').trim(); if(!add) return;
  /* タグ選択は正規語がそのまま入る。自分で打った自然文は「解釈」して正規語だけを条件にする */
  const terms = (via==='tag') ? add.split(/\s+/) : toFacets(add);
  const unread = (via!=='tag' && terms.length===0);   // 言葉を汲み取れなかった
  const conds = state.conds.slice();
  terms.forEach(w=>{ if(w && !conds.includes(w)) conds.push(w); });
  state.conds = dedupeConds(conds);
  state.query = state.conds.join(' ');
  const res = unread ? {q:state.query, results:[], answer:null, ambiguous:false} : analyze(state.query);
  state.turns.push({ q:state.query, pick:pick||add, via:via||'text', raw:add, unread, conds:state.conds.slice(), res });
  if(state.mode!=='chat'){ state.mode='chat'; render(); }
  else { renderCondBar(); renderSidebar(); renderThread(); }
}
/* 自然文 → 協会の正規語（4軸）に翻訳。拾えなければ空（＝条件は増やさない） */
function toFacets(text){
  const out=[];
  const age = AGES.find(a=>text.includes(a.q)||text.includes(a.f));
  if(age) out.push(age.q);
  /* 用件は“ひとつ”だけ採る（結果と日程を同時に足すと矛盾して0件になるため） */
  const map=[
    [/熱中症|暑さ|水分/, '熱中症'],
    [/中止|順延|延期|雨天/, '中止'],
    [/審判|レフェリー/, '審判'],
    [/監督|コーチ|指導/, '指導者'],
    [/講習|クリニック|研修/, '講習会'],
    [/様式|書類|申請|規約/, '規約'],
    [/お知らせ|連絡/, 'お知らせ'],
    [/順位|何位|ランキング/, '順位表'],
    [/組み合わせ|組合せ|トーナメント/, '組み合わせ'],
    [/勝|負|スコア|得点|結果/, '試合結果'],
    [/いつ|次|予定|日程|スケジュール/, '大会日程'],
    [/入会|加入|チーム|クラブ|さが/, 'チーム'],
    [/始|はじ|体験|習いたい|初心/, '体験'],
  ];
  const hit = map.find(([re])=>re.test(text));
  if(hit) out.push(hit[1]);
  /* 何も拾えないときは、素の言葉で一度だけ探す（固有名詞などを拾うため） */
  if(!out.length){
    const bare = text.replace(/[はがをにでとのやへも、。？?！!\s]/g,'');
    if(bare && analyze(bare).results.length) out.push(bare);
  }
  return out;   // 空なら条件は増やさない（＝聞き取れなかった、として応答する）
}
/* 条件を整理（重複と、他の条件に含まれてしまう語を除去） */
function dedupeConds(list){
  const uniq=[];
  list.forEach(w=>{ if(!uniq.includes(w)) uniq.push(w); });
  return uniq.filter(w => !uniq.some(o => o!==w && o.length>w.length && o.includes(w)));
}
/* 条件を入れ替える（例：小学生 → 中学生。AND条件と矛盾させないため置換で処理） */
function swapConds(q,label){
  state.conds = dedupeConds(String(q).split(/\s+/).filter(Boolean));
  state.query = state.conds.join(' ');
  state.turns.push({ q:state.query, pick:label||state.query, via:'tag', conds:state.conds.slice(), res:analyze(state.query) });
  renderCondBar(); renderSidebar(); renderThread();
}
/* 条件をはずす（再計算して新しいステップを積む＝プロセスが下に続く） */
function dropCond(c){
  const conds = state.conds.filter(x=>x!==c);
  state.conds = conds;
  state.query = conds.join(' ');
  state.turns.push({ q:state.query, pick:c, via:'drop', conds:conds.slice(), res:analyze(state.query) });
  renderCondBar(); renderSidebar(); renderThread();
}
/* 出典ページの「関連する情報」：一意に決まればそのページへ、決まらなければ探索面で会話として続きを探す */
function openRelated(r, ctx){
  const tryQ = q => { const a=analyze(q); return a.answer ? a.answer.item : (a.results.length===1 ? a.results[0] : null); };
  const hit = (ctx ? tryQ(ctx+' '+r) : null) || tryQ(r);
  if(hit){ state.mode='source'; state.sourceId=hit.id; render(); window.scrollTo(0,0); return; }
  state.conds = ctx ? [ctx] : [];
  state.query = state.conds.join(' ');
  ask(r);
}
/* toast（サンプル未接続リンクの通知） */
let toastTimer=null;
function toast(msg){
  let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; el.className='toast'; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ---------- static page ---------- */
function renderPage(id){
  const p=PAGES.find(x=>x.id===id)||PAGES[0];
  app.innerHTML = appbar() + `
  <div class="page">
    <div class="en">${esc(p.en)}</div>
    <h1>${esc(p.title)}</h1>
    <p class="plead">${esc(p.lead)}</p>
    ${p.blocks.map(b=>`<div class="pblock"><h2>${esc(b[0])}</h2><p>${esc(b[1])}</p></div>`).join('')}
    <button class="pback" data-home="1">← 情報をさがす</button>
  </div>`;
  bindHeader(); window.scrollTo(0,0);
}

/* ---------- source page ---------- */
function renderSource(id){
  const it=CONTENT.find(c=>c.id===id)||CONTENT[0];
  const target=(it.axes.target||[])[0];
  const type=(it.axes.type||[])[0]||(it.axes.purpose||[])[0]||(it.axes.admin||[])[0]||'情報';
  const chips=[]; if(target) chips.push('対象 · '+target); chips.push('情報タイプ · '+type);
  /* 種別（4種など）→ 口語（小学生など）。関連リンクの文脈語として使う */
  const ageQ=((AGES.find(a=>a.f===target)||{}).q)||'';
  let body='';
  if(it.results){
    body+=`<div class="sect"><div class="bar"></div><div class="en">RESULTS</div><div class="jp">第7節 結果</div></div>
    <table class="res"><thead><tr><th>会場</th><th>対戦カード</th><th>スコア</th></tr></thead><tbody>
    ${it.results.map(r=>`<tr><td class="venue">${esc(r[0])}</td><td>${esc(r[1])}</td><td class="score">${esc(r[2])}</td></tr>`).join('')}
    </tbody></table>
    <div class="srclinks"><button class="srclink" data-dl="1">第7節 詳細（PDF）をダウンロード ↓</button><button class="srclink" data-rel="大会日程 組み合わせ" data-ctx="${esc(ageQ)}">大会の組み合わせ・日程を見る →</button></div>`;
  } else {
    body+=`<div class="sect"><div class="bar"></div><div class="en">DETAIL</div><div class="jp">内容</div></div>
    <p class="lead">詳細な要項・申込方法・各種様式は、${esc(it.committee)}の掲載ページに記載しています。最新の内容は下記からご確認ください。</p>
    <div class="srclinks"><button class="srclink" data-dl="1">関連する様式・PDFをダウンロード ↓</button></div>`;
  }
  if(it.related){
    body+=`<div class="sect"><div class="bar"></div><div class="en">RELATED</div><div class="jp">関連する情報</div></div>`;
    body+=it.related.map(r=>`<button class="listrow" data-rel="${esc(r)}" data-ctx="${esc(ageQ)}"><span>${esc(r)}</span><span class="arw">→</span></button>`).join('');
  }
  app.innerHTML = appbar() + `
  <div class="srcbody">
    <button class="back" data-back="1">← 探索にもどる</button>
    <div class="crumb">ホーム ／ ${esc(target||'情報')} ／ ${esc(type)}</div>
    <div class="tchips">${chips.map(c=>`<span class="tchip"><span class="tl">${esc(c)}</span></span>`).join('')}</div>
    <h1>${esc(it.title)}</h1>
    <div class="srcmeta"><div class="av">N</div><div><span class="cm">${esc(it.committee)}</span> <span class="dt">・ ${esc(it.date)} 更新</span></div></div>
    <p class="lead">${esc(it.lead||it.snippet)}</p>
    ${body}
    <div class="ground"><div class="ck">✓</div><p>このページは長野県サッカー協会 ${esc(it.committee)} が掲載した情報です。探索面のAIは、このページを根拠として案内しています。</p></div>
    <div class="srcfoot">長野県サッカー協会 ｜ ${esc(it.committee)}　　© Nagano Football Association</div>
  </div>`;
  bindHeader(); window.scrollTo(0,0);
}

/* ---------- render / events ---------- */
function render(){
  if(state.mode==='source') renderSource(state.sourceId);
  else if(state.mode==='page') renderPage(state.pageId);
  else if(state.mode==='chat') renderChat();
  else renderEntry();
}
function bindHeader(){
  const b=document.getElementById('burger');
  if(b) b.addEventListener('click',openMenu);
}
const drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');
function openMenu(){ drawer.classList.add('open'); scrim.classList.add('show'); const b=document.getElementById('burger'); if(b)b.classList.add('open'); }
function closeMenu(){ drawer.classList.remove('open'); scrim.classList.remove('show'); const b=document.getElementById('burger'); if(b)b.classList.remove('open'); }
document.getElementById('dclose').addEventListener('click',closeMenu);
scrim.addEventListener('click',closeMenu);

document.addEventListener('click',e=>{
  const page=e.target.closest('[data-page]');
  const open=e.target.closest('[data-open]');
  const home=e.target.closest('[data-home]');
  const back=e.target.closest('[data-back]');
  const drop=e.target.closest('[data-drop]');
  const swap=e.target.closest('[data-swap]');
  const clear=e.target.closest('[data-clear]');
  const dl=e.target.closest('[data-dl]');
  const rel=e.target.closest('[data-rel]');
  const ex=e.target.closest('[data-ex]');
  const tag=e.target.closest('[data-q]');
  if(page){ closeMenu(); state.mode='page'; state.pageId=page.getAttribute('data-page'); render(); return; }
  if(open){ state.mode='source'; state.sourceId=open.getAttribute('data-open'); render(); return; }
  if(back){ state.mode = state.turns.length?'chat':'entry'; render(); return; }
  if(home){ closeMenu(); state.mode = state.turns.length?'chat':'entry'; render(); return; }
  if(drop){ dropCond(drop.getAttribute('data-drop')); return; }
  if(swap){ swapConds(swap.getAttribute('data-swap'), (swap.textContent||'').replace(/\d+$/,'').replace(/[#]/g,'').trim()); return; }
  if(clear){ state.query=''; state.conds=[]; state.turns=[]; state.mode='entry'; render(); return; }
  if(dl){ toast('サンプルのため、PDFリンクは未接続です'); return; }
  if(rel){ openRelated(rel.getAttribute('data-rel'), rel.getAttribute('data-ctx')||''); return; }
  if(ex){ ask(ex.getAttribute('data-ex')); return; }
  if(tag){
    const fanEl=tag.closest('.fan');
    if(fanEl) fanEl.classList.add('converge');
    const q=tag.getAttribute('data-q');
    /* ラベルは件数バッジ(.tn)や×を除いた本文だけを使う */
    const clone=tag.cloneNode(true);
    clone.querySelectorAll('.tn,.x,.hash,.pdot').forEach(n=>n.remove());
    const label=(clone.textContent||'').trim();
    setTimeout(()=>ask(q,'tag',label), fanEl?190:0);
    return;
  }
});

renderMenu();
render();
</script>
