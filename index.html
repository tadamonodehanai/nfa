<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長野県サッカー協会｜情報探索 プロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F9; --card:#FFFFFF; --soft:#EEF0F4;
    --ink:#1B1D26; --ink2:#5B6270; --muted:#9AA0AC;
    --accent:#1D2283; --accentDk:#151845; --accentPale:#E9EAF3; --line:#DEE1E9;
    --appbar:68px;
    --font:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font);font-weight:400;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  ::selection{background:var(--accent);color:#fff;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:4px;}
  .tl{display:inline-flex;align-items:center;gap:6px;transform:translateY(-1px);}

  /* ---- header ---- */
  .appbar{height:var(--appbar);display:flex;align-items:center;justify-content:space-between;
    padding:0 36px;background:var(--card);border-bottom:1px solid var(--soft);}
  .brand{display:flex;align-items:center;gap:18px;}
  .logo-fa{height:26px;width:auto;display:block;}
  .logo-lp{height:30px;width:auto;display:block;border-radius:3px;}
  .demo-tag{font-size:12px;font-weight:500;color:#fff;background:var(--accent);padding:6px 12px;border-radius:3px;letter-spacing:.04em;}

  .tagzone{padding:28px 22px 48px;}
  .searchzone{padding:36px 44px;border-bottom:1px solid var(--soft);background:var(--bg);}
  .resultzone{padding:34px 44px 48px;}

  @media (min-width:921px){
    body[data-view="explore"]{overflow:hidden;height:100vh;}
    .workspace{display:grid;grid-template-columns:25% 75%;grid-template-rows:auto 1fr;
      grid-template-areas:"tags search" "tags results";height:calc(100vh - var(--appbar));}
    .tagzone{grid-area:tags;overflow-y:auto;border-right:1px solid var(--soft);}
    .searchzone{grid-area:search;}
    .resultzone{grid-area:results;overflow-y:auto;}
  }

  /* ---- search: the heart ---- */
  .searchwrap{max-width:780px;}
  .slab{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;margin:0 0 12px;}
  .slab .bar{width:22px;height:3px;border-radius:2px;background:var(--accent);}
  .inputbox{position:relative;}
  .inputbox svg{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--accent);}
  #q{width:100%;height:66px;border:2.5px solid var(--accent);background:var(--card);border-radius:6px;
    padding:0 56px 0 58px;font-size:18px;font-weight:400;color:var(--ink);font-family:inherit;transition:border-color .15s,box-shadow .15s;}
  #q::placeholder{color:var(--muted);font-weight:400;}
  #q:focus{outline:none;border-color:var(--accentDk);box-shadow:0 0 0 4px var(--accentPale);}
  .clearq{position:absolute;right:18px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:4px;
    background:var(--soft);color:var(--ink2);font-weight:400;font-size:17px;display:none;align-items:center;justify-content:center;}
  .clearq.show{display:flex;}
  .exrow{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px;max-width:780px;}
  .ex{font-size:13px;font-weight:400;color:var(--ink);background:var(--card);border-radius:2px;padding:0 12px;height:31px;
    display:inline-flex;align-items:center;box-shadow:0 1px 2px rgba(20,24,60,.06);}
  .ex:hover{box-shadow:0 2px 6px rgba(20,24,60,.12);}
  .ex .hash{color:var(--accent);font-weight:700;margin-right:1px;}

  /* ---- tags: solid, borderless, crisp ---- */
  .tgroup{margin-bottom:28px;animation:fade .35s ease both;}
  .gl{font-size:12px;font-weight:500;color:var(--ink2);letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:9px;}
  .gl .barmini{width:16px;height:3px;border-radius:2px;background:var(--accent);}
  .gtags{display:flex;flex-wrap:wrap;gap:8px;}
  .tag{display:inline-flex;align-items:center;height:33px;padding:0 13px;border-radius:2px;
    background:var(--card);color:var(--ink);font-size:14px;font-weight:400;line-height:1;
    box-shadow:0 1px 2px rgba(20,24,60,.07);transition:background .15s,color .15s,box-shadow .15s,transform .1s;animation:pop .26s ease both;}
  .tag:hover{box-shadow:0 2px 7px rgba(20,24,60,.14);}
  .tag:active{transform:scale(.97);}
  .tag .hash{color:var(--accent);font-weight:700;}
  .tag .pdot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none;}
  .tag.hit{background:var(--accent);color:#fff;box-shadow:none;}
  .tag.hit .hash{color:#fff;}
  .tag.hit .pdot{background:#fff;}
  .tag .x{margin-left:2px;opacity:.85;}
  .clearall{font-size:12px;font-weight:500;color:var(--accent);background:var(--accentPale);border-radius:3px;padding:6px 11px;line-height:1;}
  .selrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}

  /* ---- results ---- */
  .rhint{color:var(--ink2);font-size:14px;font-weight:400;line-height:2;padding:8px 0 4px;max-width:640px;}
  .rhint b{color:var(--accent);font-weight:500;}
  .fade{animation:fade .3s ease both;}
  .answer{background:var(--card);border-radius:8px;padding:32px 34px;margin:0 0 20px;box-shadow:0 2px 8px rgba(20,24,60,.06);animation:pop .3s ease both;}
  .answer .top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
  .answer h2{font-size:24px;font-weight:700;margin:0;line-height:1.4;color:var(--ink);}
  .badge{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;font-size:12px;font-weight:500;padding:6px 12px;border-radius:3px;white-space:nowrap;flex:none;}
  .badge .bd{width:6px;height:6px;border-radius:50%;background:#fff;}
  .answer .src{color:var(--ink2);font-size:12px;font-weight:400;margin:14px 0 0;}
  .answer .sum{color:var(--ink2);font-size:14px;line-height:2;margin:18px 0 0;}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-weight:500;font-size:14px;padding:14px 26px;border-radius:4px;margin-top:24px;transition:background .15s,transform .1s;}
  .btn:hover{background:var(--accentDk);}
  .btn:active{transform:translateY(1px);}
  .rlabel{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.06em;margin:6px 0 14px;}
  .card{background:var(--card);border-radius:6px;padding:24px 26px;margin:0 0 14px;cursor:pointer;box-shadow:0 1px 4px rgba(20,24,60,.06);transition:box-shadow .15s,transform .1s;animation:pop .3s ease both;}
  .card:hover{box-shadow:0 4px 14px rgba(20,24,60,.12);}
  .card:active{transform:scale(.996);}
  .card h3{font-size:16px;font-weight:500;margin:0;color:var(--ink);}
  .card .meta{color:var(--muted);font-size:12px;font-weight:400;margin:10px 0 0;}
  .card .snip{color:var(--ink2);font-size:14px;line-height:1.85;margin:10px 0 0;}
  .card .open{color:var(--accent);font-weight:500;font-size:13px;margin:14px 0 0;display:inline-block;}
  .empty{color:var(--ink2);font-size:14px;font-weight:400;padding:28px 0;}

  /* ---- source page ---- */
  .srcbody{max-width:820px;margin:0 auto;padding:48px 32px 110px;}
  .back{font-size:13px;font-weight:500;color:var(--accent);margin-bottom:32px;display:inline-block;}
  .crumb{color:var(--muted);font-size:12px;font-weight:400;margin:0 0 20px;}
  .tchips{display:flex;flex-wrap:wrap;gap:9px;margin:0 0 28px;}
  .tchip{font-size:13px;font-weight:400;color:var(--ink);background:var(--card);border-radius:2px;padding:0 13px;height:31px;
    display:inline-flex;align-items:center;box-shadow:0 1px 2px rgba(20,24,60,.06);}
  .tchip .hash{color:var(--accent);font-weight:700;margin-right:2px;}
  .srcbody h1{font-size:32px;font-weight:700;line-height:1.45;margin:0 0 28px;color:var(--ink);}
  .srcmeta{display:flex;align-items:center;gap:13px;margin:0 0 40px;}
  .srcmeta .av{width:36px;height:36px;border-radius:4px;background:var(--accent);color:#fff;font-weight:500;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .srcmeta .cm{font-weight:500;color:var(--ink);font-size:14px;}
  .srcmeta .dt{color:var(--muted);font-size:12px;}
  .lead{color:var(--ink2);font-size:16px;line-height:2.1;margin:0 0 48px;}
  .sect{margin:0 0 20px;}
  .sect .bar{width:30px;height:4px;border-radius:2px;background:var(--accent);margin:0 0 14px;}
  .sect .en{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em;}
  .sect .jp{font-size:24px;font-weight:700;margin:4px 0 0;color:var(--ink);}
  table.res{width:100%;border-collapse:collapse;margin:0 0 20px;}
  table.res th{text-align:left;padding:0 18px 14px;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.04em;}
  table.res td{text-align:left;padding:16px 18px;font-size:16px;font-weight:400;color:var(--ink);}
  table.res tr:nth-child(even) td{background:var(--soft);}
  table.res .venue{color:var(--ink2);font-size:14px;width:120px;}
  table.res .score{font-weight:700;width:110px;color:var(--accent);}
  .srclinks{display:flex;flex-wrap:wrap;gap:28px;margin:0 0 48px;font-weight:500;font-size:14px;color:var(--accent);}
  .listrow{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:6px;padding:20px 24px;margin:0 0 12px;font-weight:500;font-size:15px;color:var(--ink);box-shadow:0 1px 3px rgba(20,24,60,.06);transition:box-shadow .15s;}
  .listrow:hover{box-shadow:0 4px 12px rgba(20,24,60,.12);}
  .listrow .arw{color:var(--accent);}
  .ground{background:var(--accentPale);border-radius:6px;padding:22px 26px;display:flex;gap:16px;align-items:flex-start;margin:20px 0 48px;}
  .ground .ck{width:24px;height:24px;border-radius:4px;background:var(--accent);color:#fff;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;}
  .ground p{margin:0;font-size:14px;font-weight:400;line-height:1.9;color:var(--ink);}
  .srcfoot{border-top:1px solid var(--soft);padding-top:32px;text-align:center;color:var(--muted);font-size:12px;font-weight:400;}
  .srctop{background:var(--card);border-bottom:1px solid var(--soft);}
  .srctop .in{max-width:1120px;margin:0 auto;padding:0 36px;height:var(--appbar);display:flex;align-items:center;justify-content:space-between;}
  .navlinks{display:flex;align-items:center;gap:24px;font-size:13px;font-weight:400;color:var(--ink2);}
  .navlinks .find{background:var(--accent);color:#fff;font-weight:500;padding:8px 14px;border-radius:4px;}

  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  @keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  @media (max-width:920px){
    .appbar{padding:0 20px;}
    .brand{gap:12px;}
    .workspace{display:block;}
    .searchzone{position:sticky;top:0;z-index:5;padding:26px 22px;}
    .resultzone{padding:26px 22px 48px;}
    .tagzone{border-top:1px solid var(--soft);}
    #q{height:60px;font-size:17px;}
    .srcbody{padding:34px 20px 80px;}
    .srcbody h1{font-size:26px;}
    .srctop .in{padding:0 20px;}
    .navlinks{gap:14px;font-size:12px;}
    table.res th,table.res td{padding:12px 12px;font-size:14px;}
    table.res .venue{width:58px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

/* =====================================================================
   探索エンジン（スタンドイン）— 本番は analyze()/buildCloud() を
   実データの RAG + LLM に差し替え。表示は口語、照合は正規語に対応づけ。
   ===================================================================== */

const {CONTENT,AGES,INTENTS,RESOURCES,ADMINX,DEEP,BROAD,EXAMPLES}=window.NFA;  // データは data.js
function detect(q){
  q=q||'';
  let age=null;
  for(const a of AGES){ if(q.includes(a.q)||q.includes(a.f)){ age=a; break; } }
  let intent=null;
  const im={
    '試合結果':()=>q.includes('試合結果')||q.includes('試合')||q.includes('結果'),
    '大会日程':()=>q.includes('大会日程')||q.includes('日程')||q.includes('スケジュール'),
    '順位表':()=>q.includes('順位'),
    '組み合わせ':()=>q.includes('組み合わせ')||q.includes('組合せ'),
    'チーム':()=>q.includes('チーム')||q.includes('入会')||q.includes('加盟')||q.includes('さがす'),
    '体験':()=>q.includes('体験')||q.includes('募集')||q.includes('はじめ'),
  };
  for(const it of INTENTS){ if(im[it.core] && im[it.core]()){ intent={kind:'intent',obj:it}; break; } }
  if(!intent){ for(const r of RESOURCES){ if(q.includes(r.core)||(r.core==='審判'&&q.includes('審判'))||(r.core==='指導者'&&q.includes('指導者'))||(r.core==='講習会'&&q.includes('講習'))){ intent={kind:'res',obj:r}; break; } } }
  if(!intent){ for(const ad of ADMINX){ if(q.includes(ad.core)||(ad.core==='規約'&&(q.includes('様式')||q.includes('書類')||q.includes('登録')))||(ad.core==='中止'&&q.includes('順延'))){ intent={kind:'admin',obj:ad}; break; } } }
  return {age,intent};
}

function buildCloud(q){
  q=(q||'').trim();
  const {age,intent}=detect(q);
  if(!age && !intent){
    return { mode:'root', groups:[
      {label:'だれの情報？（年代・カテゴリ）', tags:AGES.map(a=>tagObj(a.l,a.q))},
      {label:'試合・大会のこと', tags:INTENTS.slice(0,4).map(i=>tagObj(i.l,i.q))},
      {label:'はじめたい・入りたい', tags:INTENTS.slice(4).map(i=>tagObj(i.l,i.q))},
      {label:'資格・講習', tags:RESOURCES.map(r=>tagObj(r.l,r.q))},
      {label:'手続き・安全・お知らせ', tags:ADMINX.map(a=>tagObj(a.l,a.q,a.pri===1))},
    ]};
  }
  const selected=[];
  if(age) selected.push(tagObj(age.l,age.q));
  if(intent) selected.push(tagObj(intent.obj.short||intent.obj.l, intent.obj.q, intent.obj.pri===1));
  let narrow=[], branch=[];
  if(age && !intent){
    narrow = INTENTS.map(i=>tagObj(age.q+'の'+i.short, age.q+' '+i.q));
    branch = AGES.filter(a=>a!==age).map(a=>tagObj(a.l,a.q));
  } else if(intent && !age && intent.kind==='intent'){
    narrow = AGES.map(a=>tagObj(a.q+'の'+intent.obj.short, a.q+' '+intent.obj.q));
    branch = INTENTS.filter(i=>i!==intent.obj).map(i=>tagObj(i.l,i.q));
  } else if(age && intent && intent.kind==='intent'){
    const deep = DEEP[intent.obj.core] || [];
    narrow = deep.map(d=>tagObj(age.q+'の'+d[0], age.q+' '+intent.obj.q+' '+d[1]));
    branch = INTENTS.filter(i=>i!==intent.obj).slice(0,4).map(i=>tagObj(age.q+'の'+i.short, age.q+' '+i.q))
      .concat(AGES.filter(a=>a!==age).slice(0,3).map(a=>tagObj(a.q+'の'+intent.obj.short, a.q+' '+intent.obj.q)));
  } else if(intent && intent.kind==='res'){
    const map={ '審判':['審判をはじめる','審判の講習日程','担当の割り当て'],
      '指導者':['C級をとる','リフレッシュ研修','コーチを募集'],
      '講習会':['審判の講習','指導者の講習','GKクリニック'],
      'GK':['GKクリニック','GK体験会'] };
    narrow=(map[intent.obj.core]||[]).map(l=>tagObj(l,l));
    branch=RESOURCES.filter(r=>r!==intent.obj).map(r=>tagObj(r.l,r.q));
  } else if(intent && intent.kind==='admin'){
    narrow=ADMINX.filter(a=>a!==intent.obj).map(a=>tagObj(a.l,a.q,a.pri===1));
    branch=AGES.slice(0,4).map(a=>tagObj(a.l,a.q));
  } else {
    branch=AGES.map(a=>tagObj(a.l,a.q));
  }
  return { mode:'focus', selected, narrow, branch };
}
function tagObj(label,q,priority){ return {label,q,priority:!!priority}; }

function analyze(qRaw){
  const q=(qRaw||'').trim();
  if(!q) return {q,results:[],answer:null,ambiguous:false};
  const hasAge=!!detect(q).age;
  const scored=CONTENT.map(it=>{
    let s=0;
    it.keywords.forEach(k=>{ if(q.includes(k)) s+=2; });
    if(q.includes(it.title)) s+=4;
    Object.values(it.axes).flat().forEach(v=>{ if(q.includes(v)) s+=1; });
    if(it.priority&&s>0) s+=0.5;
    return {it,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  const ambiguous = BROAD.some(b=>q.includes(b)) && !hasAge && scored.length>2;
  let answer=null;
  const top=scored[0];
  if(top && !ambiguous && top.s>=4 && (scored.length<2 || top.s-scored[1].s>=1.5 || top.s>=6)){
    answer={item:top.it, confidence: top.s>=6?'高':'中'};
  }
  return {q, results:scored.map(x=>x.it), answer, ambiguous};
}

/* ===================== 描画 ===================== */
const app=document.getElementById('app');
const state={query:'',view:'explore',sourceId:null};
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const brandHtml=`<div class="brand"><img class="logo-fa" src="${LOGO_FA}" alt="長野県サッカー協会"><img class="logo-lp" src="${LOGO_LP}" alt="L+1 Life Plus One"></div>`;

function render(){ document.body.setAttribute('data-view',state.view); state.view==='source'?renderSource(state.sourceId):renderExplore(); }

function renderExplore(){
  app.innerHTML=`
  <div class="appbar">${brandHtml}<span class="demo-tag">サンプル / DEMO</span></div>
  <div class="workspace">
    <section class="searchzone">
      <div class="searchwrap">
        <div class="slab"><span class="bar"></span>キーワードでさがす</div>
        <div class="inputbox">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
          <input id="q" type="text" autocomplete="off" placeholder="ことばはそのままでOK。例）小学生の試合、審判になりたい…" value="${esc(state.query)}" aria-label="探したい情報を入力">
          <button class="clearq" data-clear="1" aria-label="クリア">×</button>
        </div>
      </div>
      <div class="exrow">${EXAMPLES.map(e=>`<button class="ex" data-q="${esc(e)}"><span class="tl"><span class="hash">#</span>${esc(e)}</span></button>`).join('')}</div>
    </section>
    <aside class="tagzone" id="tagzone"></aside>
    <section class="resultzone" id="resultzone"></section>
  </div>`;
  updateTags(); updateResults(); toggleClear();
  document.getElementById('q').focus();
}

function toggleClear(){ const c=document.querySelector('.clearq'); if(c) c.classList.toggle('show', !!state.query); }

function renderTag(t){
  return `<button class="tag ${t.selected?'hit':''}" data-q="${esc(t.q)}"><span class="tl">${t.priority?'<span class="pdot"></span>':''}<span class="hash">#</span>${esc(t.label)}${t.selected?'<span class="x">×</span>':''}</span></button>`;
}
function updateTags(){
  const c=buildCloud(state.query); let html='';
  if(c.mode==='root'){
    html=c.groups.map(g=>`<div class="tgroup"><div class="gl"><span class="barmini"></span>${esc(g.label)}</div><div class="gtags">${g.tags.map(renderTag).join('')}</div></div>`).join('');
  } else {
    html+=`<div class="tgroup"><div class="gl"><span class="barmini"></span>いま探している<button class="clearall" data-clear="1" style="margin-left:auto">すべて解除</button></div><div class="gtags selrow">${c.selected.map(t=>renderTag(Object.assign({selected:true},t))).join('')}</div></div>`;
    if(c.narrow.length) html+=`<div class="tgroup"><div class="gl"><span class="barmini"></span>さらに絞る</div><div class="gtags">${c.narrow.map(renderTag).join('')}</div></div>`;
    if(c.branch.length) html+=`<div class="tgroup"><div class="gl"><span class="barmini"></span>ほかの選び方・関連</div><div class="gtags">${c.branch.map(renderTag).join('')}</div></div>`;
  }
  document.getElementById('tagzone').innerHTML=html;
}

function updateResults(){
  const a=analyze(state.query); let html='';
  if(!a.q){
    html=`<p class="rhint">左のタグ、または上の検索から。<b>使うほど、ここに情報が絞り込まれていきます。</b></p>`;
  } else {
    if(a.ambiguous){
      html+=`<p class="rhint">「${esc(a.q)}」だけだと候補が多めです。<b>左の「だれの情報？」から年代を選ぶ</b>と、ぴったりに絞れます。</p>`;
    }
    if(a.answer){
      const it=a.answer.item;
      html+=`<div class="answer">
        <div class="top"><h2>${esc(it.title)}</h2><span class="badge"><span class="tl"><span class="bd"></span>確信度 ${a.answer.confidence}</span></span></div>
        <div class="src">出典：${esc(it.committee)} ・ ${esc(it.date)} 更新</div>
        <div class="sum">${esc(it.lead||it.snippet)}</div>
        <button class="btn" data-open="${it.id}">この結果ページを開く</button></div>`;
    }
    const list=a.answer?a.results.filter(r=>r.id!==a.answer.item.id):a.results;
    if(list.length){
      html+=`<div class="rlabel">${a.answer?'関連する情報':'見つかった情報 '+a.results.length+'件'}</div>`;
      html+=list.slice(0,8).map(it=>`<div class="card" data-open="${it.id}">
        <h3>${esc(it.title)}</h3>
        <div class="meta">出典：${esc(it.committee)} ・ ${esc(it.date)} 更新</div>
        <div class="snip">${esc(it.snippet)}</div>
        <span class="open">出典ページを開く →</span></div>`).join('');
    } else if(!a.answer && !a.ambiguous){
      html+=`<div class="empty">該当が見つかりませんでした。左のタグからお探しいただけます。</div>`;
    }
  }
  document.getElementById('resultzone').innerHTML=html;
}

function setQuery(q){
  state.query=q;
  const inp=document.getElementById('q'); if(inp) inp.value=q;
  updateTags(); updateResults(); toggleClear();
  if(inp){ inp.focus(); try{inp.setSelectionRange(q.length,q.length);}catch(e){} }
}

function renderSource(id){
  const it=CONTENT.find(c=>c.id===id)||CONTENT[0];
  const target=(it.axes.target||[])[0];
  const type=(it.axes.type||[])[0]||(it.axes.purpose||[])[0]||(it.axes.admin||[])[0]||'情報';
  const chips=[]; if(target) chips.push('対象 · '+target); chips.push('情報タイプ · '+type);
  let body='';
  if(it.results){
    body+=`<div class="sect"><div class="bar"></div><div class="en">RESULTS</div><div class="jp">第7節 結果</div></div>
    <table class="res"><thead><tr><th>会場</th><th>対戦カード</th><th>スコア</th></tr></thead><tbody>
    ${it.results.map(r=>`<tr><td class="venue">${esc(r[0])}</td><td>${esc(r[1])}</td><td class="score">${esc(r[2])}</td></tr>`).join('')}
    </tbody></table>
    <div class="srclinks"><a href="#">第7節 詳細（PDF）をダウンロード ↓</a><a href="#">大会の組み合わせ・日程を見る →</a></div>`;
  } else {
    body+=`<div class="sect"><div class="bar"></div><div class="en">DETAIL</div><div class="jp">内容</div></div>
    <p class="lead">${esc(it.lead||it.snippet)} 詳細と申込・様式は、担当委員会の掲載ページに記載しています。</p>
    <div class="srclinks"><a href="#">関連する様式・PDFをダウンロード ↓</a></div>`;
  }
  if(it.related){
    body+=`<div class="sect"><div class="bar"></div><div class="en">RELATED</div><div class="jp">関連する情報</div></div>`;
    body+=it.related.map(r=>`<div class="listrow"><span>${esc(r)}</span><span class="arw">→</span></div>`).join('');
  }
  app.innerHTML=`
  <div class="srctop"><div class="in">${brandHtml}
    <div class="navlinks"><span>ホーム</span><span>年代</span><span>試合・大会</span><span>審判</span><button class="find" data-home="1">サイト内を探す</button></div>
  </div></div>
  <div class="srcbody">
    <button class="back" data-home="1">← 探索にもどる</button>
    <div class="crumb">ホーム ／ ${esc(target||'情報')} ／ ${esc(type)}</div>
    <div class="tchips">${chips.map(c=>`<span class="tchip"><span class="tl">${esc(c)}</span></span>`).join('')}</div>
    <h1>${esc(it.title)}</h1>
    <div class="srcmeta"><div class="av">協</div><div><span class="cm">${esc(it.committee)}</span> <span class="dt">・ ${esc(it.date)} 更新</span></div></div>
    <p class="lead">${esc(it.lead||it.snippet)}</p>
    ${body}
    <div class="ground"><div class="ck">✓</div><p>このページは長野県サッカー協会 ${esc(it.committee)} が掲載した情報です。探索面のAIは、このページを根拠として案内しています。</p></div>
    <div class="srcfoot">長野県サッカー協会 ｜ ${esc(it.committee)}　　© Nagano Football Association</div>
  </div>`;
  window.scrollTo(0,0);
}

document.addEventListener('input',e=>{ if(e.target&&e.target.id==='q'){ state.query=e.target.value; updateTags(); updateResults(); toggleClear(); } });
document.addEventListener('click',e=>{
  const open=e.target.closest('[data-open]');
  const home=e.target.closest('[data-home]');
  const clear=e.target.closest('[data-clear]');
  const tagBtn=e.target.closest('[data-q]');
  if(open){ state.view='source'; state.sourceId=open.getAttribute('data-open'); render(); return; }
  if(home){ state.view='explore'; render(); return; }
  if(clear){ setQuery(''); return; }
  if(tagBtn){ setQuery(tagBtn.getAttribute('data-q')); return; }
});

render();
</script>
