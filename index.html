<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長野県サッカー協会｜情報探索 プロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFF8; --card:#FFFFFF; --inner:#FBFAF0; --ink:#222222; --ink2:#66665F;
    --muted:#9A988E; --border:#E7E3D6; --accent:#FCD41A; --accentDim:#EFC400;
    --paleY:#FFF7CE; --mutePill:#F5F3E9; --muteTx:#AEAC9F; --chipInk:#33332E;
    --font:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body{min-height:100vh;}
  ::selection{background:var(--accent);color:var(--ink);}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  :focus-visible{outline:3px solid var(--accentDim);outline-offset:2px;border-radius:6px;}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:20px 28px;max-width:1120px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:.01em;}
  .brand .dot{width:13px;height:13px;border-radius:50%;background:var(--accent);flex:none;}
  .demo-tag{font-size:12px;font-weight:700;color:var(--ink);background:var(--accent);
    padding:5px 11px;border-radius:999px;}

  /* ---------- explore ---------- */
  .explore{max-width:820px;margin:0 auto;padding:0 24px 96px;}
  .hero{padding:46px 0 8px;text-align:center;animation:rise .6s cubic-bezier(.2,.7,.2,1) both;}
  .hero h1{font-size:clamp(26px,4vw,40px);font-weight:900;line-height:1.3;margin:0 0 6px;letter-spacing:.01em;}
  .hero .hl{background:linear-gradient(transparent 58%, var(--accent) 58%, var(--accent) 92%, transparent 92%);
    padding:0 2px;}
  .hero p{color:var(--ink2);font-size:16px;font-weight:500;margin:10px 0 0;}

  .searchwrap{position:relative;max-width:620px;margin:30px auto 0;}
  .searchwrap svg{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--muted);}
  #q{width:100%;height:66px;border:1.5px solid var(--border);background:var(--card);
    border-radius:999px;padding:0 26px 0 58px;font-size:18px;font-weight:700;color:var(--ink);
    font-family:inherit;transition:border-color .2s, box-shadow .2s;}
  #q::placeholder{color:var(--muted);font-weight:400;}
  #q:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 4px var(--paleY);}

  .seeds{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:18px auto 0;max-width:620px;}
  .seed{font-size:14px;font-weight:500;color:var(--ink2);background:var(--card);
    border:1.5px solid var(--border);border-radius:999px;padding:8px 15px;transition:border-color .2s,color .2s;}
  .seed:hover{border-color:var(--ink);color:var(--ink);}

  /* tag cloud */
  .cloud{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:34px auto 0;max-width:760px;}
  .tag{font-size:16px;font-weight:500;color:var(--chipInk);background:var(--card);
    border:1.5px solid var(--border);border-radius:999px;padding:11px 16px;display:inline-flex;
    align-items:center;gap:7px;transition:background .28s ease,color .28s ease,transform .28s ease,border-color .28s ease,opacity .28s ease;}
  .tag:hover{border-color:var(--ink);}
  .tag .pdot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;}
  .tag.hit{background:var(--accent);border-color:var(--accent);color:var(--ink);font-weight:700;
    transform:scale(1.05);font-size:17px;padding:12px 18px;}
  .tag.hit .pdot{background:var(--ink);}
  .tag.muted{background:var(--mutePill);border-color:transparent;color:var(--muteTx);transform:scale(.96);}
  .tag.muted .pdot{background:var(--muteTx);}

  .legend{display:flex;align-items:center;justify-content:center;gap:8px;margin:26px 0 0;
    font-size:13px;color:var(--muted);}
  .legend .pdot{width:8px;height:8px;border-radius:50%;background:var(--accent);}

  /* dynamic area */
  #dyn{margin-top:34px;}
  .hint{text-align:center;color:var(--ink2);font-size:15px;font-weight:500;}
  .fade{animation:rise .45s cubic-bezier(.2,.7,.2,1) both;}

  .clarify{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:22px 24px;margin:0 0 18px;}
  .clarify .qrow{display:flex;align-items:center;gap:12px;margin:0 0 14px;}
  .clarify .qmark{width:28px;height:28px;border-radius:50%;background:var(--accent);color:var(--ink);
    font-weight:700;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;}
  .clarify .qtext{font-size:17px;font-weight:700;}
  .clarify .opts{display:flex;flex-wrap:wrap;gap:9px;}
  .opt{font-size:15px;font-weight:500;color:var(--chipInk);background:var(--card);
    border:1.5px solid var(--border);border-radius:999px;padding:9px 15px;transition:background .2s,border-color .2s;}
  .opt:hover{background:var(--paleY);border-color:var(--accentDim);}

  .answer{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:26px 28px;margin:0 0 18px;}
  .answer .top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
  .answer h2{font-size:24px;font-weight:900;margin:0;line-height:1.35;letter-spacing:.01em;}
  .badge{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;
    font-size:13px;font-weight:700;padding:6px 12px;border-radius:999px;white-space:nowrap;flex:none;}
  .badge .bd{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .answer .src{color:var(--muted);font-size:14px;font-weight:500;margin:12px 0 0;}
  .answer .sum{color:var(--ink2);font-size:16px;line-height:1.85;margin:14px 0 0;
    border-top:1.5px solid var(--border);padding-top:16px;}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:var(--ink);
    font-weight:700;font-size:15px;padding:13px 24px;border-radius:999px;margin-top:18px;transition:transform .12s;}
  .btn:hover{transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .trust{color:var(--muted);font-size:13px;line-height:1.7;margin:14px 0 0;}

  .rlabel{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;margin:6px 0 12px;}
  .card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:18px 20px;margin:0 0 12px;
    transition:border-color .2s, transform .12s;cursor:pointer;}
  .card:hover{border-color:var(--ink);}
  .card:active{transform:scale(.995);}
  .card .ctop{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .card h3{font-size:18px;font-weight:700;margin:0;}
  .card .meta{color:var(--muted);font-size:13px;font-weight:500;margin:7px 0 0;}
  .card .snip{color:var(--ink2);font-size:15px;line-height:1.7;margin:9px 0 0;}
  .card .open{color:var(--ink);font-weight:700;font-size:14px;margin:11px 0 0;display:inline-block;}
  .card .open .arw{color:var(--accentDim);}
  .empty{text-align:center;color:var(--ink2);font-size:15px;font-weight:500;padding:26px 0;}

  /* ---------- source page ---------- */
  .srcnav{border-bottom:1.5px solid var(--border);background:var(--card);}
  .srcnav .inner{max-width:1120px;margin:0 auto;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;}
  .navlinks{display:flex;align-items:center;gap:22px;font-size:15px;font-weight:500;color:var(--ink2);}
  .navlinks .find{background:var(--accent);color:var(--ink);font-weight:700;padding:9px 15px;border-radius:999px;}
  .srcbody{max-width:840px;margin:0 auto;padding:34px 28px 90px;}
  .back{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:22px;display:inline-flex;gap:8px;align-items:center;}
  .back .arw{color:var(--accentDim);}
  .crumb{color:var(--muted);font-size:14px;margin:0 0 16px;}
  .tchips{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 20px;}
  .tchip{font-size:15px;font-weight:500;color:var(--chipInk);background:var(--card);
    border:1.5px solid var(--border);border-radius:999px;padding:9px 15px;}
  .srcbody h1{font-size:clamp(26px,3.6vw,34px);font-weight:900;line-height:1.35;margin:0 0 20px;letter-spacing:.01em;}
  .srcmeta{display:flex;align-items:center;gap:12px;margin:0 0 24px;}
  .srcmeta .av{width:34px;height:34px;border-radius:50%;background:var(--accent);color:var(--ink);
    font-weight:700;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .srcmeta .cm{font-weight:700;}
  .srcmeta .dt{color:var(--muted);font-size:15px;}
  .lead{color:var(--ink2);font-size:17px;line-height:1.9;margin:0 0 34px;}
  .sect{margin:0 0 16px;}
  .sect .bar{width:36px;height:5px;border-radius:3px;background:var(--accent);margin:0 0 12px;}
  .sect .en{font-size:13px;font-weight:700;color:var(--ink2);}
  .sect .jp{font-size:22px;font-weight:900;margin:2px 0 0;letter-spacing:.01em;}
  table.res{width:100%;border-collapse:collapse;border:1.5px solid var(--border);border-radius:14px;
    overflow:hidden;margin:0 0 24px;}
  table.res th,table.res td{text-align:left;padding:15px 20px;font-size:16px;}
  table.res th{font-size:14px;font-weight:700;color:var(--ink2);border-bottom:1.5px solid var(--border);}
  table.res td{border-top:1px solid var(--border);}
  table.res tr:nth-child(even) td{background:#FCFBF2;}
  table.res .venue{color:var(--ink2);font-size:15px;width:120px;}
  table.res .score{font-weight:700;width:110px;}
  .srclinks{display:flex;flex-wrap:wrap;gap:24px;margin:0 0 40px;font-weight:700;font-size:15px;}
  .srclinks a .arw{color:var(--accentDim);}
  .listrow{display:flex;align-items:center;justify-content:space-between;background:var(--card);
    border:1.5px solid var(--border);border-radius:14px;padding:18px 22px;margin:0 0 12px;font-weight:700;font-size:16px;}
  .listrow .arw{color:var(--accentDim);}
  .ground{background:var(--paleY);border-radius:14px;padding:18px 22px;display:flex;gap:16px;align-items:flex-start;margin:14px 0 40px;}
  .ground .ck{width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .ground p{margin:0;font-size:15px;font-weight:500;line-height:1.7;}
  .srcfoot{border-top:1.5px solid var(--border);padding-top:26px;text-align:center;color:var(--muted);font-size:14px;}

  .pagefoot{max-width:820px;margin:0 auto;padding:0 24px 40px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.8;}

  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media (max-width:640px){
    .topbar{padding:16px 18px;}
    .explore{padding:0 16px 72px;}
    .hero{padding:30px 0 4px;}
    #q{height:58px;font-size:16px;padding:0 20px 0 52px;}
    .searchwrap svg{left:20px;}
    .tag{font-size:15px;padding:10px 14px;}
    .answer,.clarify{padding:20px;}
    .answer h2{font-size:20px;}
    .srcbody{padding:24px 18px 72px;}
    .navlinks{gap:14px;font-size:13px;}
    table.res th,table.res td{padding:12px 12px;font-size:14px;}
    table.res .venue{width:64px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

];
const SEEDS = ['3種の次の試合','審判の登録方法','熱中症のとき','女子で始めたい'];

const SEIBETSU = ['1種','2種','3種','4種','シニア','女子','フットサル','キッズ'];
const SEIBETSU_ALIAS = {'中学':'3種','小学':'4種','高校':'2種','社会人':'1種'};
const BROAD = ['試合','大会','リーグ','結果','日程','中止'];

/* ---- ここがエンジン本体（差し替え点） ---- */
function analyze(qRaw){
  const q = (qRaw||'').trim();
  if(!q) return {q, results:[], answer:null, clarify:null};
  const hasSeibetsu = SEIBETSU.some(s=>q.includes(s)) || Object.keys(SEIBETSU_ALIAS).some(a=>q.includes(a));
  const scored = CONTENT.map(it=>{
    let s=0;
    it.keywords.forEach(k=>{ if(q.includes(k)) s+=2; });
    if(q.includes(it.title)) s+=4;
    Object.values(it.axes).flat().forEach(v=>{ if(q.includes(v)) s+=1; });
    if(it.priority && s>0) s+=0.5;
    return {it,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);

  const ambiguous = BROAD.some(b=>q.includes(b)) && !hasSeibetsu && scored.length>2;
  let clarify=null;
  if(ambiguous){
    clarify={ question:'どの種別のことですか？',
      options:['1種（社会人）','2種（高校）','3種（中学）','4種（小学）','シニア','女子','フットサル'] };
  }
  let answer=null;
  const top=scored[0];
  if(top && !ambiguous && top.s>=4 && (scored.length<2 || top.s - scored[1].s >= 1.5 || top.s>=6)){
    answer={ item:top.it, confidence: top.s>=6 ? '高' : '中' };
  }
  return { q, results:scored.map(x=>x.it), answer, clarify };
}

/* --- タグの状態（hit / muted / default） --- */
function tagState(tag, q){
  if(!q) return 'default';
  const hit = tag.kw.some(k=>q.includes(k)) || q.includes(tag.label.replace(/（.*?）/,''));
  return hit ? 'hit' : 'muted';
}

/* ===================== 描画 ===================== */
const app = document.getElementById('app');
const state = { query:'', view:'explore', sourceId:null };
const esc = s => (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const seibetsuCore = opt => opt.replace(/（.*?）/,'');

function renderExplore(){
  const a = analyze(state.query);
  const tagsHtml = (() => {
    const withState = TAGS.map(t=>({t, st:tagState(t, state.query)}));
    withState.sort((x,y)=> (y.st==='hit') - (x.st==='hit'));
    return withState.map(({t,st})=>
      `<button class="tag ${st}" data-tag="${esc(t.label)}">${t.priority?'<span class="pdot"></span>':''}${esc(t.label)}</button>`
    ).join('');
  })();

  app.innerHTML = `
  <div class="topbar">
    <div class="brand"><span class="dot"></span>長野県サッカー協会</div>
    <span class="demo-tag">サンプル / DEMO</span>
  </div>
  <main class="explore">
    <div class="hero">
      <h1>あいまいな問いから、<br><span class="hl">ほしい情報へ。</span></h1>
      <p>委員会の区分は気にせず、思いつくままに。使うほど、近づきます。</p>
    </div>
    <div class="searchwrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <input id="q" type="text" autocomplete="off" placeholder="例）3種の次の試合、審判の登録…" value="${esc(state.query)}" aria-label="探したい情報を入力">
    </div>
    <div class="seeds">${SEEDS.map(s=>`<button class="seed" data-seed="${esc(s)}">${esc(s)}</button>`).join('')}</div>
    <div class="cloud">${tagsHtml}</div>
    <div class="legend"><span class="pdot"></span>＝ 優先して掲示したい情報</div>
    <div id="dyn">${renderDynamic(a)}</div>
  </main>
  <footer class="pagefoot">
    サンプルデータでの動作デモ｜長野県サッカー協会 サイトリニューアル<br>
    本番のAI案内は、実データ（RAG）＋出典明示で行います。
  </footer>`;

  const input = document.getElementById('q');
  // keep caret at end after re-render
  const val = input.value; input.focus(); input.setSelectionRange(val.length, val.length);
}

function renderDynamic(a){
  if(!a.q){
    return `<p class="hint fade">曖昧な言葉でも大丈夫。入力するほど、関連する情報が前に出て、必要なときは種別を聞き返します。</p>`;
  }
  let html = '<div class="fade">';
  if(a.clarify){
    html += `<div class="clarify">
      <div class="qrow"><div class="qmark">?</div><div class="qtext">${esc(a.clarify.question)}</div></div>
      <div class="opts">${a.clarify.options.map(o=>`<button class="opt" data-opt="${esc(seibetsuCore(o))}">${esc(o)}</button>`).join('')}</div>
    </div>`;
  }
  if(a.answer){
    const it=a.answer.item;
    html += `<div class="answer">
      <div class="top"><h2>${esc(it.title)}</h2><span class="badge"><span class="bd"></span>確信度 ${a.answer.confidence}</span></div>
      <div class="src">出典：${esc(it.committee)} ・ ${esc(it.date)} 更新</div>
      <div class="sum">${esc(it.lead || it.snippet)}</div>
      <button class="btn" data-open="${it.id}">この結果ページを開く</button>
      <div class="trust">この案内は協会の掲載ページに基づいています。日程・結果は変更される場合があります。</div>
    </div>`;
  }
  if(a.results.length){
    const list = a.answer ? a.results.filter(r=>r.id!==a.answer.item.id) : a.results;
    if(list.length){
      html += `<div class="rlabel">${a.answer?'関連する情報':'見つかった情報'}</div>`;
      html += list.slice(0,5).map(it=>`
        <div class="card" data-open="${it.id}">
          <div class="ctop"><h3>${esc(it.title)}</h3></div>
          <div class="meta">出典：${esc(it.committee)} ・ ${esc(it.date)} 更新</div>
          <div class="snip">${esc(it.snippet)}</div>
          <span class="open">出典ページを開く <span class="arw">→</span></span>
        </div>`).join('');
    }
  } else if(!a.clarify){
    html += `<div class="empty">該当が見つかりませんでした。担当委員会の一覧からお探しいただけます。</div>`;
  }
  html += '</div>';
  return html;
}

function renderSource(id){
  const it = CONTENT.find(c=>c.id===id) || CONTENT[0];
  const target = (it.axes.target||[])[0];
  const type = (it.axes.type||[])[0] || (it.axes.purpose||[])[0] || '情報';
  const chips = [];
  if(target) chips.push('対象 · '+target);
  chips.push('情報タイプ · '+type);
  let bodyHtml = '';
  if(it.results){
    bodyHtml += `<div class="sect"><div class="bar"></div><div class="en">RESULTS</div><div class="jp">第7節 結果</div></div>
      <table class="res"><thead><tr><th>会場</th><th>対戦カード</th><th>スコア</th></tr></thead><tbody>
      ${it.results.map(r=>`<tr><td class="venue">${esc(r[0])}</td><td>${esc(r[1])}</td><td class="score">${esc(r[2])}</td></tr>`).join('')}
      </tbody></table>
      <div class="srclinks"><a href="#">第7節 詳細（PDF）をダウンロード <span class="arw">↓</span></a><a href="#">大会の組み合わせ・日程を見る <span class="arw">→</span></a></div>`;
  } else {
    bodyHtml += `<div class="sect"><div class="bar"></div><div class="en">DETAIL</div><div class="jp">内容</div></div>
      <p class="lead">${esc(it.lead || it.snippet)} 詳細と申込・様式は、担当委員会の掲載ページに記載しています。</p>
      <div class="srclinks"><a href="#">関連する様式・PDFをダウンロード <span class="arw">↓</span></a></div>`;
  }
  if(it.related){
    bodyHtml += `<div class="sect"><div class="bar"></div><div class="en">RELATED</div><div class="jp">関連する情報</div></div>`;
    bodyHtml += it.related.map(r=>`<div class="listrow"><span>${esc(r)}</span><span class="arw">→</span></div>`).join('');
  }

  app.innerHTML = `
  <div class="srcnav"><div class="inner">
    <div class="brand"><span class="dot"></span>長野県サッカー協会</div>
    <div class="navlinks"><span>ホーム</span><span>種別</span><span>大会・日程</span><span>審判</span><span>お知らせ</span><button class="find" data-home="1">サイト内を探す</button></div>
  </div></div>
  <div class="srcbody">
    <button class="back" data-home="1"><span class="arw">←</span> 探索にもどる</button>
    <div class="crumb">ホーム ／ ${esc(target||'情報')} ／ ${esc(type)}</div>
    <div class="tchips">${chips.map(c=>`<span class="tchip">${esc(c)}</span>`).join('')}</div>
    <h1>${esc(it.title)}</h1>
    <div class="srcmeta"><div class="av">協</div><div><span class="cm">${esc(it.committee)}</span> <span class="dt">・ ${esc(it.date)} 更新</span></div></div>
    <p class="lead">${esc(it.lead || it.snippet)}</p>
    ${bodyHtml}
    <div class="ground"><div class="ck">✓</div><p>このページは長野県サッカー協会 ${esc(it.committee)} が掲載した情報です。探索面のAIは、このページを根拠として案内しています。</p></div>
    <div class="srcfoot">長野県サッカー協会 ｜ ${esc(it.committee)}　　© Nagano Football Association</div>
  </div>`;
  window.scrollTo(0,0);
}

/* ===================== ルーティング / イベント ===================== */
function render(){ state.view==='source' ? renderSource(state.sourceId) : renderExplore(); }

document.addEventListener('input', e=>{
  if(e.target && e.target.id==='q'){ state.query = e.target.value; document.getElementById('dyn').innerHTML = renderDynamic(analyze(state.query)); refreshTags(); }
});
function refreshTags(){
  // update classes in place so the yellow emphasis animates (no jumpy reorder while typing)
  document.querySelectorAll('.tag').forEach(el=>{
    const tag = TAGS.find(t=>t.label===el.getAttribute('data-tag'));
    if(!tag) return;
    const st = tagState(tag, state.query);
    el.classList.remove('hit','muted');
    if(st!=='default') el.classList.add(st);
  });
}
document.addEventListener('click', e=>{
  const t=e.target.closest('[data-tag]'); const s=e.target.closest('[data-seed]');
  const o=e.target.closest('[data-opt]'); const open=e.target.closest('[data-open]');
  const home=e.target.closest('[data-home]');
  if(open){ state.view='source'; state.sourceId=open.getAttribute('data-open'); render(); return; }
  if(home){ state.view='explore'; render(); return; }
  if(t){ state.query = t.getAttribute('data-tag'); render(); return; }
  if(s){ state.query = s.getAttribute('data-seed'); render(); return; }
  if(o){ const core=o.getAttribute('data-opt'); state.query=(core+' '+state.query).trim(); render(); return; }
});

render();
</script>
